
<body className="bg-[#e7f3f9] font-sans text-slate-900 min-h-screen flex flex-col">
    <div className="flex h-full grow flex-col">

        <header className="flex items-center justify-between border-b border-slate-200 px-6 lg:px-40 py-3 bg-white">
            <div className="flex items-center gap-2 text-[#1ba0f3]">
                <div className="size-8 flex items-center justify-center">
                    <span
                        className="material-symbols-outlined text-4xl [font-variation-settings:'FILL'_1]">flutter_dash</span>
                </div>
                <h2 className="text-slate-900 text-lg font-bold leading-tight tracking-tight">Social</h2>
            </div>
            <div className="flex flex-1 justify-end gap-8">
                <div className="hidden md:flex items-center gap-9">
                    <a className="text-slate-600 hover:text-[#1ba0f3] text-sm font-medium leading-normal"
                        href="#">Explore</a>
                    <a className="text-slate-600 hover:text-[#1ba0f3] text-sm font-medium leading-normal"
                        href="#">Settings</a>
                </div>
                <div className="flex gap-2">
                    <button
                        className="flex min-w-[84px] cursor-pointer items-center justify-center rounded-full h-10 px-5 bg-[#1ba0f3] text-white text-sm font-bold leading-normal tracking-wide hover:bg-[#1ba0f3]/90 transition-colors">
                        <span>Sign up</span>
                    </button>
                </div>
            </div>
        </header>

        <main className="flex-1 flex items-center justify-center p-4 md:p-10">
            <div className="w-full max-w-[480px] bg-white rounded-[2rem] shadow-xl overflow-hidden border border-slate-100">

                <div className="relative h-40 bg-[#1ba0f3] flex items-center justify-center">

                    <div
                        className="absolute inset-0 opacity-20 [background-image:radial-gradient(circle_at_2px_2px,white_1px,transparent_0)] [background-size:24px_24px]">
                    </div>
                    <span
                        className="material-symbols-outlined text-white text-7xl relative z-10 [font-variation-settings:'FILL'_1]">flutter_dash</span>
                </div>
                <div className="px-8 pb-12 pt-8">
                    <h1 className="text-slate-900 text-3xl font-bold leading-tight text-center mb-8">Log in to Social</h1>
                    <form className="space-y-6" onsubmit="event.preventDefault()">

                        <div className="flex flex-col gap-2">
                            <label className="text-slate-700 text-sm font-bold ml-1">Phone, email, or username</label>
                            <input
                                className="w-full rounded-full border-slate-200 bg-slate-50 text-slate-900 focus:border-[#1ba0f3] focus:ring-[#1ba0f3] h-14 px-6 text-base placeholder:text-slate-400 transition-all outline-none border"
                                placeholder="Phone, email, or username" type="text" />
                        </div>

                        <div className="flex flex-col gap-2">
                            <label className="text-slate-700 text-sm font-bold ml-1">Password</label>
                            <div className="relative flex items-center">
                                <input
                                    className="w-full rounded-full border-slate-200 bg-slate-50 text-slate-900 focus:border-[#1ba0f3] focus:ring-[#1ba0f3] h-14 pl-6 pr-12 text-base placeholder:text-slate-400 transition-all outline-none border"
                                    placeholder="Password" type="password" />
                                <button
                                    className="absolute right-5 text-slate-400 hover:text-[#1ba0f3] flex items-center justify-center"
                                    type="button">
                                    <span className="material-symbols-outlined text-xl">visibility</span>
                                </button>
                            </div>
                        </div>

                        <button
                            className="w-full flex items-center justify-center rounded-full h-14 bg-[#1ba0f3] text-white text-lg font-bold tracking-wide hover:bg-[#1ba0f3]/90 shadow-md shadow-blue-200 transition-all active:scale-[0.98]"
                            type="submit">
                            Log in
                        </button>
                    </form>

                    <div className="mt-8 flex flex-col items-center gap-4">
                        <a className="text-[#1ba0f3] text-sm font-semibold hover:underline" href="#">Forgot password?</a>
                        <div className="flex items-center gap-1 text-sm text-slate-500">
                            <span>Don't have an account?</span>
                            <a className="text-[#1ba0f3] font-bold hover:underline" href="#">Sign up for Social</a>
                        </div>
                    </div>
                </div>
            </div>
        </main>

    </div>
</body>

</html>
